<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios RMM</title>

<link rel="icon" type="image/png" href="https://files.catbox.moe/ota676.png">

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;
    background:#f1f5f9;
}

/* SIDEBAR */

.sidebar{
    width:220px;
    height:100vh;
    background:#1e293b;
    color:white;
    padding:20px;
    position:fixed;
}

.logo{
    width:140px;
    display:block;
    margin:0 auto 20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:15px 0;
    transition:0.3s;
}

.sidebar a:hover{
    color:#38bdf8;
}

/* MAIN */

.main{
    margin-left:260px;
    padding:20px;
    width:100%;
}

h1{
    color:#1e293b;
}

/* CARDS */

.log-container{
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* LOG CARD */

.log-card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.log-card:hover{
    transform:translateY(-3px);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.pc-name{
    font-size:22px;
    font-weight:bold;
    color:#0f172a;
}

.date{
    color:gray;
    font-size:14px;
}

/* LOGS */

.logs{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.log{
    padding:12px;
    border-radius:10px;
    font-size:14px;
}

/* TIPOS */

.success{
    background:#dcfce7;
    color:#166534;
}

.warning{
    background:#fef3c7;
    color:#92400e;
}

.danger{
    background:#fee2e2;
    color:#991b1b;
}

.info{
    background:#dbeafe;
    color:#1e40af;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <img src="https://files.catbox.moe/ota676.png" class="logo">

    <a href="index.html">Dashboard</a>
    <a href="dispositivos.html">Dispositivos</a>
    <a href="alertas.html">Alertas</a>
    <a href="relatorios.html">Relatórios</a>

</div>

<!-- MAIN -->

<div class="main">

    <h1>📄 Relatórios Diários</h1>

    <div class="log-container" id="relatorios">

    </div>

</div>

<script>

const relatorios = [

{
    pc: "PC-01",
    data: "07/05/2026",
    logs: [
        {
            tipo: "success",
            texto: "Sistema iniciado normalmente às 07:15"
        },

        {
            tipo: "warning",
            texto: "Uso de memória atingiu 80%"
        },

        {
            tipo: "danger",
            texto: "CPU chegou a 98% durante renderização"
        },

        {
            tipo: "info",
            texto: "Atualização de segurança instalada"
        }
    ]
},

{
    pc: "PC-07",
    data: "07/05/2026",
    logs: [
        {
            tipo: "success",
            texto: "Backup concluído com sucesso"
        },

        {
            tipo: "warning",
            texto: "Pouco espaço restante no SSD"
        },

        {
            tipo: "info",
            texto: "Usuário conectado às 08:02"
        }
    ]
},

{
    pc: "PC-15",
    data: "07/05/2026",
    logs: [
        {
            tipo: "danger",
            texto: "Dispositivo perdeu conexão com servidor"
        },

        {
            tipo: "danger",
            texto: "Tentativa de login inválida detectada"
        },

        {
            tipo: "success",
            texto: "Conexão restaurada automaticamente"
        }
    ]
}

];

const area = document.getElementById("relatorios");

relatorios.forEach(item => {

    let logsHTML = "";

    item.logs.forEach(log => {

        logsHTML += `
        
        <div class="log ${log.tipo}">
            ${log.texto}
        </div>
        
        `;

    });

    area.innerHTML += `

    <div class="log-card">

        <div class="top">

            <div class="pc-name">
                ${item.pc}
            </div>

            <div class="date">
                ${item.data}
            </div>

        </div>

        <div class="logs">
            ${logsHTML}
        </div>

    </div>

    `;

});

</script>

</body>
</html>
